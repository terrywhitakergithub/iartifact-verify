<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iArtifact Verifier — Provenance Check</title>
<!-- AI training opt-out — EU DSM Directive 2019/790 Art. 4 TDM reservation -->
<meta name="robots" content="noai, noimageai">
<meta name="tdm-reservation" content="1">
<meta name="ai-training" content="prohibited">
<meta name="copyright" content="© 2024–2026 Ground Zero Studios. All rights reserved.">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0e0e0f;
    --paper:   #16161a;
    --paper2:  #1e1e24;
    --border:  #2a2a35;
    --ink:     #e8e8ec;
    --ink2:    #9494a8;
    --ink3:    #5a5a72;
    --gold:    #c9a84c;
    --green:   #22c55e;
    --red:     #ef4444;
    --amber:   #d97706;
    --radius:  10px;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }
  .wordmark {
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  h1 {
    font-size: 22px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 0.04em;
  }
  .subtitle {
    font-size: 12px;
    color: var(--ink3);
    margin-top: 6px;
    font-style: italic;
  }

  .card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    width: 100%;
    max-width: 620px;
    margin-bottom: 20px;
  }

  .search-row {
    display: flex;
    gap: 10px;
  }
  input[type="text"] {
    flex: 1;
    background: var(--paper2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--ink);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--gold); }
  input[type="text"]::placeholder { color: var(--ink3); }

  button {
    background: var(--gold);
    border: none;
    border-radius: 6px;
    color: #0e0e0f;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 20px;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.4; cursor: default; }

  #status {
    font-size: 12px;
    color: var(--ink3);
    text-align: center;
    margin-top: 12px;
    min-height: 18px;
    font-style: italic;
  }

  /* Result card */
  #result { display: none; }

  .verdict {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 22px;
  }
  .verdict-icon {
    font-size: 32px;
    flex-shrink: 0;
  }
  .verdict-text { flex: 1; }
  .verdict-label {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .verdict-sub {
    font-size: 11px;
    color: var(--ink3);
    font-style: italic;
  }

  .field-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 10px 16px;
    font-size: 12px;
  }
  .field-label {
    color: var(--ink3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 10px;
    padding-top: 2px;
  }
  .field-value {
    color: var(--ink);
    word-break: break-all;
  }
  .field-value.mono {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--ink2);
  }
  .field-value.sealed {
    color: var(--red);
    font-weight: 700;
  }
  .field-value.not-found {
    color: var(--amber);
  }

  .chain-hash {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--ink3);
  }
  .chain-hash span {
    display: block;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: var(--ink3);
    margin-top: 4px;
    word-break: break-all;
  }

  .not-found-card { text-align: center; padding: 32px; }
  .not-found-card .nf-icon { font-size: 36px; margin-bottom: 12px; }
  .not-found-card .nf-title { font-size: 15px; color: var(--amber); margin-bottom: 8px; }
  .not-found-card .nf-body { font-size: 12px; color: var(--ink3); line-height: 1.7; }

  footer {
    font-size: 10px;
    color: var(--ink3);
    text-align: center;
    margin-top: 32px;
    line-height: 1.8;
  }
  footer a { color: var(--ink3); text-decoration: none; }
  footer a:hover { color: var(--gold); }

  .pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Branded topbar header ── */
  header {
    width: 100%;
    max-width: 620px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    padding: 0;
  }
  .hero-icon {
    position: relative;
    width: 38px;
    height: 46px;
    flex-shrink: 0;
  }
  .hero-icon-glow {
    position: absolute;
    width: 80px; height: 90px;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse, rgba(201,168,76,0.25) 0%, transparent 70%);
    filter: blur(10px);
    animation: hero-pulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes hero-pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
  .hero-icon svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 6px rgba(201,168,76,0.7))
            drop-shadow(0 0 18px rgba(201,168,76,0.3));
  }
  .hero-icon svg path, .hero-icon svg line {
    fill: none; stroke: #f5c96a; stroke-width: 9;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .hero-icon svg .doc-fill { fill: rgba(245,201,106,0.07); }
  .hero-brand {
    flex: 1;
    min-width: 0;
  }
  .hero-wordmark {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
    font-family: 'Georgia', serif;
  }
  .hero-wordmark em { font-style: italic; font-weight: 400; color: var(--ink2); }
  .hero-tagline {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.06em;
    font-style: italic;
    opacity: 0.8;
  }
  .hero-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .hero-badge {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: rgba(245,201,106,0.65);
    font-family: 'Courier New', monospace;
    white-space: nowrap;
  }
  .hero-badge svg { width: 10px; height: 10px; flex-shrink: 0; }
  @media (max-width: 500px) { .hero-badges { display: none; } }
</style>
</head>
<body>

<header>
  <div class="hero-icon">
    <div class="hero-icon-glow"></div>
    <svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
      <path class="doc-fill" d="M20 18 Q20 10 28 10 L112 10 L140 38 L140 162 Q140 170 132 170 L28 170 Q20 170 20 162 Z"/>
      <path d="M20 18 Q20 10 28 10 L112 10 L140 38 L140 162 Q140 170 132 170 L28 170 Q20 170 20 162 Z"/>
      <path d="M112 10 L112 38 L140 38"/>
      <line style="stroke-width:6" x1="42" y1="70" x2="118" y2="70"/>
      <line style="stroke-width:6" x1="42" y1="95" x2="118" y2="95"/>
      <line style="stroke-width:6" x1="42" y1="120" x2="90" y2="120"/>
      <path d="M95 145 C95 130,115 130,115 145 L115 175 C115 190,135 190,135 175 L135 155"/>
      <path d="M105 155 C105 170,125 170,125 155 L125 125 C125 110,145 110,145 125 L145 145"/>
    </svg>
  </div>
  <div class="hero-brand">
    <div class="hero-wordmark"><em>i</em>Artifact</div>
    <div class="hero-tagline">Prove You Made It.</div>
  </div>
  <div class="hero-badges">
    <div class="hero-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="#f5c96a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      RFC 3161
    </div>
    <div class="hero-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="#f5c96a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
      SHA-384
    </div>
    <div class="hero-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="#f5c96a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
      DigiCert QTSP
    </div>
  </div>
</header>

<div class="card">
  <div class="search-row">
    <input type="text" id="ia-input" placeholder="iA-ID (e.g. 3a7f2c1b9e04…)" autocomplete="off" spellcheck="false">
    <button id="verify-btn" onclick="verify()">Verify</button>
  </div>
  <div id="status"></div>
</div>

<div class="card" id="result"></div>

<footer>
  <strong style="color:var(--gold)">iArtifact</strong> &nbsp;·&nbsp; a <a href="mailto:thareapa85@gmail.com">Ground Zero Studios</a> product<br>
  <span style="font-size:11px;opacity:0.6">© 2024–2026 Ground Zero Studios. All rights reserved.</span>
</footer>

<script>
// Update this to your Cloudflare Worker URL once deployed.
// Leave empty string to run in offline/local-only mode.
const REGISTRY = 'https://iartifact-registry.iartifact.workers.dev';

// Auto-read ?ia= from URL on page load (QR codes land here)
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const ia = params.get('ia') || params.get('id') || '';
  if (ia) {
    document.getElementById('ia-input').value = ia.trim();
    verify();
  }
  document.getElementById('ia-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') verify();
  });
});

async function verify() {
  const input = document.getElementById('ia-input').value.trim();
  const status = document.getElementById('status');
  const result = document.getElementById('result');
  const btn = document.getElementById('verify-btn');

  if (!input) { status.textContent = 'Enter an iA-ID to verify.'; return; }

  // Basic format check — hex, 12–64 chars
  if (!/^[0-9a-f]{12,64}$/i.test(input)) {
    status.textContent = 'iA-IDs are hex strings (0-9, a-f), 12–64 characters.';
    result.style.display = 'none';
    return;
  }

  btn.disabled = true;
  status.innerHTML = '<span class="pulse">Checking registry…</span>';
  result.style.display = 'none';

  try {
    const resp = await fetch(`${REGISTRY}/lookup?ia=${encodeURIComponent(input.toLowerCase())}`);
    const data = await resp.json();

    if (resp.status === 404 || !data.found) {
      showNotFound(input, result);
    } else {
      showFound(data, result);
    }
    status.textContent = '';
  } catch (err) {
    status.textContent = 'Registry unreachable — check your connection and try again.';
  } finally {
    btn.disabled = false;
  }
}

function showFound(d, el) {
  const sealed = d.sealed ? true : false;
  const sealedLabel = sealed
    ? '<span class="field-value sealed">■ Permanently sealed</span>'
    : '<span class="field-value not-found">○ Not sealed</span>';

  const chainBlock = d.chain_hash
    ? `<div class="chain-hash">Chain hash (last entry):<span>${esc(d.chain_hash)}</span></div>`
    : '';

  const tsaBlock = d.tsa_cert_hash
    ? `<div class="field-label">TSA cert hash</div><div class="field-value mono">${esc(d.tsa_cert_hash)}</div>`
    : '';

  const typeRow = d.artifact_type && d.artifact_type !== 'Unknown'
    ? `<div class="field-label">Type</div><div class="field-value">${esc(d.artifact_type)}</div>`
    : '';

  const certRow = d.cert_date
    ? `<div class="field-label">Cert date</div><div class="field-value">${esc(d.cert_date)}</div>`
    : '';

  const regAt = d.registered_at
    ? new Date(d.registered_at).toLocaleString(undefined, { dateStyle:'medium', timeStyle:'short' })
    : '';

  el.style.display = 'block';
  el.innerHTML = `
    <div class="verdict">
      <div class="verdict-icon">✅</div>
      <div class="verdict-text">
        <div class="verdict-label" style="color:var(--green)">Record found in public registry</div>
        <div class="verdict-sub">This iA-ID is registered and verifiable.</div>
      </div>
    </div>
    <div class="field-grid">
      <div class="field-label">iA-ID</div>
      <div class="field-value mono">${esc(d.ia_id)}</div>

      <div class="field-label">Name</div>
      <div class="field-value">${esc(d.name)}</div>

      <div class="field-label">Owner</div>
      <div class="field-value">${esc(d.owner)}</div>

      ${typeRow}
      ${certRow}

      <div class="field-label">Status</div>
      ${sealedLabel}

      <div class="field-label">Registered</div>
      <div class="field-value">${esc(regAt)}</div>

      ${tsaBlock}
    </div>
    ${chainBlock}
  `;
  el.style.display = 'block';
}

function showNotFound(ia_id, el) {
  el.innerHTML = `
    <div class="not-found-card">
      <div class="nf-icon">⚠️</div>
      <div class="nf-title">iA-ID not found in public registry</div>
      <div class="nf-body">
        <strong style="color:var(--ink2)">${esc(ia_id)}</strong><br><br>
        This iA-ID has no entry in the public registry. This could mean:<br>
        · The artifact was created but not yet registered<br>
        · The iA-ID was entered incorrectly<br>
        · The artifact was created offline without registry access<br><br>
        The absence of a registry entry does not by itself prove a work is inauthentic —
        it means the author has not published the record publicly.
        Request the iArtifact certificate file directly from the creator for offline verification.
      </div>
    </div>
  `;
  el.style.display = 'block';
}

function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
